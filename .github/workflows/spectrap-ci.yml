name: SpecTrap CI — Validate Generated Properties

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-ground-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install hypothesis pytest numpy
      - name: Run ground truth tests
        run: pytest ground_truth/ -v --tb=short

  spectrap-soundness:
    runs-on: ubuntu-latest
    needs: validate-ground-truth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .
      - name: Validate any generated specs in repo
        run: |
          if [ -d "generated/" ]; then
            find generated/ -name "*.py" ! -name "*.meta.json" | head -20 | while read f; do
              echo "--- $f ---"
              spectrap validate "$f" || true
            done
          fi
