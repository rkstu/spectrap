name: SpecTrap Soundness Gate

on:
  pull_request:
    paths:
      - 'specs/**'
      - 'tests/generated/**'
      - 'properties/**'

jobs:
  spectrap-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SpecTrap
        run: |
          pip install spectrap hypothesis pytest numpy

      - name: Validate AI-generated specs
        run: |
          # Find all test files that look AI-generated (or in the specs directory)
          find specs/ tests/generated/ properties/ -name "test_*.py" -o -name "*_spec.py" | while read f; do
            echo "Validating: $f"
            spectrap validate "$f"
          done

      - name: Run SpecTrap adversarial check
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # For any new spec files in this PR, regenerate under pressure and compare
          spectrap run --functions all --conditions D,G3 --models gpt-4o-mini --epochs 1 --output /tmp/spectrap_check
          spectrap report --results /tmp/spectrap_check/results.json
